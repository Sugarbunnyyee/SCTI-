<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCTI 校园生存人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: #f5f1eb;
            min-height: 100vh;
            padding: 20px;
            color: #3d3d3d;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 30px 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid #e8e3db;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #5b7b94;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #7a7a7a;
        }
        .divider {
            width: 40px;
            height: 3px;
            background: #e8a87c;
            border-radius: 2px;
            margin: 12px auto 0;
        }
        .btn {
            display: inline-block;
            padding: 12px 26px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            letter-spacing: 0.5px;
            text-decoration: none;
            text-align: center;
            margin: 5px;
        }
        .btn-primary {
            background: #5b7b94;
            color: #fff;
        }
        .btn-primary:hover {
            background: #4a6a82;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #e8e3db;
            color: #3d3d3d;
        }
        .btn-outline:hover {
            border-color: #b0a590;
        }
        .hidden {
            display: none !important;
        }
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: #e8e3db;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #5b7b94;
            border-radius: 10px;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 0.8rem;
            color: #7a7a7a;
            font-weight: 600;
            min-width: 45px;
        }
        .q-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #e8a87c;
            background: #fdf3e9;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        .q-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .q-hint {
            font-size: 0.8rem;
            color: #e8a87c;
            margin-bottom: 12px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border: 2px solid #e8e3db;
            border-radius: 14px;
            cursor: pointer;
            background: #fdfdfb;
            font-size: 0.95rem;
            line-height: 1.4;
            user-select: none;
        }
        .option:hover {
            border-color: #c4b99a;
        }
        .option.selected {
            border-color: #5b7b94;
            background: #f2f6f9;
            font-weight: 500;
        }
        .option-radio {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #ccc;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: transparent;
        }
        .option-check {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid #ccc;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: transparent;
        }
        .option.selected .option-radio,
        .option.selected .option-check {
            border-color: #5b7b94;
            background: #5b7b94;
            color: #fff;
        }
        .option-letter {
            font-weight: 700;
            color: #5b7b94;
            min-width: 20px;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .personality-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            margin-top: 14px;
        }
        .personality-mini {
            background: #fdfdfb;
            border: 1.5px solid #e8e3db;
            border-radius: 14px;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
        }
        .personality-mini:hover {
            border-color: #5b7b94;
            transform: translateY(-2px);
        }
        .personality-mini .p-emoji {
            font-size: 1.8rem;
        }
        .personality-mini .p-code {
            font-size: 0.65rem;
            font-weight: 700;
            color: #5b7b94;
        }
        .personality-mini .p-name {
            font-size: 0.85rem;
            font-weight: 700;
        }
        .personality-mini .p-tagline {
            font-size: 0.68rem;
            color: #7a7a7a;
            margin-top: 2px;
        }
        .result-hero {
            text-align: center;
            padding: 10px 0 16px;
            border-bottom: 1px solid #e8e3db;
            margin-bottom: 16px;
        }
        .result-emoji {
            font-size: 5rem;
        }
        .result-code {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: #5b7b94;
        }
        .result-name {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 4px 0;
        }
        .result-tagline {
            font-size: 0.9rem;
            color: #e8a87c;
            margin-bottom: 4px;
        }
        .result-type-tag {
            display: inline-block;
            background: #f0ebe0;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            color: #5b5b5b;
            margin-top: 4px;
        }
        .interpretation {
            background: #faf8f4;
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 14px;
            font-size: 0.9rem;
            line-height: 1.7;
            color: #555;
        }
        .interpretation b {
            color: #5b7b94;
        }
        .sw-row {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .sw-box {
            flex: 1;
            min-width: 140px;
            border-radius: 14px;
            padding: 14px;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .sw-box.strengths {
            background: #f0f7f0;
            border: 1px solid #d4e8d4;
        }
        .sw-box.weaknesses {
            background: #fef6f0;
            border: 1px solid #f0dcc8;
        }
        .sw-box h4 {
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        .sw-box ul {
            padding-left: 18px;
        }
        .sw-box li {
            margin-bottom: 3px;
        }
        .dim-section {
            margin-bottom: 14px;
        }
        .dim-section h4 {
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .dim-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.82rem;
        }
        .dim-label {
            width: 75px;
            text-align: right;
            font-weight: 600;
            color: #7a7a7a;
            flex-shrink: 0;
        }
        .dim-bar-wrap {
            flex: 1;
            height: 22px;
            background: #e8e3db;
            border-radius: 12px;
            overflow: hidden;
        }
        .dim-bar-fill {
            height: 100%;
            border-radius: 12px;
            transition: width 0.8s;
        }
        .dim-bar-fill.blue {
            background: #5b7b94;
        }
        .dim-bar-fill.orange {
            background: #e8a87c;
        }
        .dim-val {
            width: 40px;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .match-row {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .match-card {
            flex: 1;
            min-width: 130px;
            background: #fdfdfb;
            border: 1.5px solid #e8e3db;
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }
        .match-card h4 {
            font-size: 0.78rem;
            color: #7a7a7a;
            margin-bottom: 6px;
        }
        .match-card .m-emoji {
            font-size: 2rem;
        }
        .match-card .m-name {
            font-weight: 700;
            font-size: 0.85rem;
        }
        .match-card .m-desc {
            font-size: 0.7rem;
            color: #7a7a7a;
            margin-top: 2px;
        }
        .match-card.best {
            border-color: #c4d8c4;
            background: #f7faf7;
        }
        .match-card.comp {
            border-color: #f0d8c0;
            background: #fefaf6;
        }
        .sim-badge {
            display: inline-block;
            background: #5b7b94;
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.68rem;
            font-weight: 700;
            margin-top: 4px;
        }
        .result-motto {
            text-align: center;
            font-style: italic;
            color: #7a7a7a;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }
        .btn-row-center {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">

                weaknesses: ['行动力不足容易拖延', '过度躺平可能影响学业', '社交参与度低可能被边缘化'],
                best: { code: 'EJFT', em: '🛏️', name: '寝室不动产', desc: '你们可以一起躺一整天，一句话不说但很满足', sim: 90 },
                comp: { code: 'EJLF', em: '☀️', name: '人间小太阳', desc: '你的存在是ta能量守恒的另一半，ta发光你吸收', sim: 74 },
                motto: '"随便""都行""别卷了来躺一会儿"' }
        };

        var curQ = 0;
        var sel = {};
        var sc = { E: 0, I: 0, J: 0, P: 0, L: 0, F: 0, T: 0, Fs: 0 };

        // ==================== 初始化 ====================
        function init() {
            renderHomeGrid();
            document.getElementById('homeCard').classList.remove('hidden');
            document.getElementById('quizCard').classList.add('hidden');
            document.getElementById('resultArea').innerHTML = '';
        }

        function renderHomeGrid() {
            var grid = document.getElementById('homeMiniGrid');
            var html = '';
            for (var code in pers) {
                var p = pers[code];
                html += '<div class="personality-mini" onclick="showPersonalityDetail(\'' + code + '\')">';
                html += '<div class="p-emoji">' + p.em + '</div>';
                html += '<div class="p-code">' + code + '</div>';
                html += '<div class="p-name">' + p.nm + '</div>';
                html += '<div class="p-tagline">' + p.tg + '</div>';
                html += '</div>';
            }
            grid.innerHTML = html;
        }

        function showPersonalityDetail(code) {
            var p = pers[code];
            if (!p) return;
            var resultArea = document.getElementById('resultArea');
            resultArea.innerHTML = buildResultCard(code, p);
            document.getElementById('homeCard').classList.add('hidden');
            document.getElementById('quizCard').classList.add('hidden');
            // 滚动到结果区域
            setTimeout(function() {
                var target = resultArea.querySelector('.card');
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 100);
        }

        function buildResultCard(code, p) {
            var html = '<div class="card">';
            // 英雄区
            html += '<div class="result-hero">';
            html += '<div class="result-emoji">' + p.em + '</div>';
            html += '<div class="result-code">' + code + '</div>';
            html += '<div class="result-name">' + p.nm + '</div>';
            html += '<div class="result-tagline">' + p.tg + '</div>';
            html += '<div class="result-type-tag">' + p.typeTag + '</div>';
            html += '</div>';
            // 人物解读
            html += '<div class="interpretation"><b>📖 人物解读</b><br>' + p.interpret + '</div>';
            // 优势盲点
            html += '<div class="sw-row">';
            html += '<div class="sw-box strengths"><h4>✅ 优势</h4><ul>';
            for (var i = 0; i < p.strengths.length; i++) { html += '<li>' + p.strengths[i] + '</li>'; }
            html += '</ul></div>';
            html += '<div class="sw-box weaknesses"><h4>⚠️ 盲点</h4><ul>';
            for (var j = 0; j < p.weaknesses.length; j++) { html += '<li>' + p.weaknesses[j] + '</li>'; }
            html += '</ul></div></div>';
            // 维度分数
            html += buildDimBars(code);
            // 匹配人格
            html += '<div class="match-row">';
            html += '<div class="match-card best"><h4>🤝 最佳搭子</h4>';
            html += '<div class="m-emoji">' + p.best.em + '</div>';
            html += '<div class="m-name">' + p.best.name + '</div>';
            html += '<div class="sim-badge">' + p.best.sim + '%匹配</div>';
            html += '<div class="m-desc">' + p.best.desc + '</div></div>';
            html += '<div class="match-card comp"><h4>⚡ 相爱相杀</h4>';
            html += '<div class="m-emoji">' + p.comp.em + '</div>';
            html += '<div class="m-name">' + p.comp.name + '</div>';
            html += '<div class="sim-badge" style="background:#e8a87c;">' + p.comp.sim + '%互补</div>';
            html += '<div class="m-desc">' + p.comp.desc + '</div></div>';
            html += '</div>';
            // 口头禅
            html += '<div class="result-motto">💬 ' + p.motto + '</div>';
            // 按钮
            html += '<div class="btn-row-center">';
            html += '<button class="btn btn-primary" onclick="startTest()">🔄 开始测试</button>';
            html += '<button class="btn btn-outline" onclick="goHome()">👀 查看全部16型</button>';
            html += '</div></div>';
            return html;
        }

        function buildDimBars(code) {
            var scores = {
                E: code[0] === 'E' ? 75 : 25,
                I: code[0] === 'I' ? 75 : 25,
                J: code[1] === 'J' ? 75 : 25,
                P: code[1] === 'P' ? 75 : 25,
                L: code[2] === 'L' ? 75 : 25,
                F_f: code[2] === 'F' ? 75 : 25,
                T: code[3] === 'T' ? 75 : 25,
                F_s: code[3] === 'F' ? 75 : 25
            };
            var html = '<div class="dim-section"><h4>📊 维度倾向分数</h4>';
            var dims = [
                { label: '外向 (E)', val: scores.E, cls: 'blue' },
                { label: '内向 (I)', val: scores.I, cls: 'orange' },
                { label: '规划 (J)', val: scores.J, cls: 'blue' },
                { label: '随性 (P)', val: scores.P, cls: 'orange' },
                { label: '主导 (L)', val: scores.L, cls: 'blue' },
                { label: '跟随 (F)', val: scores.F_f, cls: 'orange' },
                { label: '理性 (T)', val: scores.T, cls: 'blue' },
                { label: '感性 (F)', val: scores.F_s, cls: 'orange' }
            ];
            for (var i = 0; i < dims.length; i++) {
                var d = dims[i];
                html += '<div class="dim-row">';
                html += '<span class="dim-label">' + d.label + '</span>';
                html += '<div class="dim-bar-wrap"><div class="dim-bar-fill ' + d.cls + '" style="width:' + d.val +
                    '%"></div></div>';
                html += '<span class="dim-val">' + d.val + '%</span>';
                html += '</div>';
            }
            html += '</div>';
            return html;
        }

        function goHome() {
            document.getElementById('resultArea').innerHTML = '';
            document.getElementById('homeCard').classList.remove('hidden');
            document.getElementById('quizCard').classList.add('hidden');
            document.getElementById('homeCard').scrollIntoView({ behavior: 'smooth' });
        }

        // ==================== 测试逻辑 ====================
        function startTest() {
            curQ = 0;
            sel = {};
            sc = { E: 0, I: 0, J: 0, P: 0, L: 0, F: 0, T: 0, Fs: 0 };
            document.getElementById('homeCard').classList.add('hidden');
            document.getElementById('resultArea').innerHTML = '';
            document.getElementById('quizCard').classList.remove('hidden');
            renderQ();
        }

        function renderQ() {
            var q = questions[curQ];
            var area = document.getElementById('questionArea');
            var isMulti = q.type === 'multi';
            var curSel = sel[q.id] || [];
            var html = '<div class="q-badge">' + (isMulti ? '多选' : '单选') + ' · 第' + q.id + '题</div>';
            html += '<div class="q-title">' + q.title + '</div>';
            if (isMulti) html += '<div class="q-hint">💡 可多选，选好后点击下一题</div>';
            html += '<div class="options">';
            for (var i = 0; i < q.options.length; i++) {
                var o = q.options[i];
                var selected = curSel.indexOf(o.l) > -1;
                html += '<div class="option' + (selected ? ' selected' : '') + '" data-l="' + o.l + '" data-d="' + o
                    .d + '" onclick="toggleOpt(this,' + q.id + ',\'' + o.l + '\',\'' + o.d + '\',' + isMulti + ')">';
                html += '<div class="' + (isMulti ? 'option-check' : 'option-radio') + '">✓</div>';
                html += '<span class="option-letter">' + o.l + '</span>';
                html += '<span class="option-text">' + o.t + '</span></div>';
            }
            html += '</div>';
            area.innerHTML = html;
            updateProgress();
            document.getElementById('prevBtn').classList.toggle('hidden', curQ === 0);
            document.getElementById('nextBtn').textContent = curQ === questions.length - 1 ? '🎉 查看结果' : '下一题 →';
            document.getElementById('nextBtn').disabled = false;
        }

        function toggleOpt(el, qId, letter, dim, isMulti) {
            if (!sel[qId]) sel[qId] = [];
            if (isMulti) {
                var idx = sel[qId].indexOf(letter);
                if (idx > -1) { sel[qId].splice(idx, 1);
                    el.classList.remove('selected'); } else { sel[qId].push(letter);
                    el.classList.add('selected'); }
            } else {
                var parent = el.parentElement;
                var all = parent.querySelectorAll('.option');
                for (var i = 0; i < all.length; i++) { all[i].classList.remove('selected'); }
                el.classList.add('selected');
                sel[qId] = [letter];
            }
        }

        function nextQ() {
            var q = questions[curQ];
            if (!sel[q.id] || sel[q.id].length === 0) {
                var card = document.getElementById('quizCard');
                card.style.transform = 'translateX(-5px)';
                setTimeout(function() { card.style.transform = 'translateX(5px)'; }, 120);
                setTimeout(function() { card.style.transform = ''; }, 240);
                return;
            }
            addScores(q, sel[q.id]);
            if (curQ < questions.length - 1) {
                curQ++;
                renderQ();
            } else {
                showResult();
            }
        }

        function prevQ() {
            if (curQ > 0) {
                var q = questions[curQ];
                subScores(q, sel[q.id] || []);
                curQ--;
                renderQ();
            }
        }

        function updateProgress() {
            var pct = Math.round(((curQ + 1) / questions.length) * 100);
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = (curQ + 1) + '/' + questions.length;
        }

        function addScores(q, letters) {
            var done = {};
            for (var i = 0; i < letters.length; i++) {
                var l = letters[i];
                for (var j = 0; j < q.options.length; j++) {
                    if (q.options[j].l === l && !done[q.options[j].d]) {
                        done[q.options[j].d] = true;
                        sc[q.options[j].d] = (sc[q.options[j].d] || 0) + 1;
                    }
                }
            }
        }

        function subScores(q, letters) {
            var done = {};
            for (var i = 0; i < letters.length; i++) {
                var l = letters[i];
                for (var j = 0; j < q.options.length; j++) {
                    if (q.options[j].l === l && !done[q.options[j].d]) {
                        done[q.options[j].d] = true;
                        sc[q.options[j].d] = Math.max(0, (sc[q.options[j].d] || 0) - 1);
                    }
                }
            }
        }

        function showResult() {
            var e = sc.E || 0,
                i = sc.I || 0,
                j = sc.J || 0,
                p = sc.P || 0,
                l = sc.L || 0,
                f = sc.F || 0,
                t = sc.T || 0,
                fs = sc.Fs || 0;
            var c1 = e > i ? 'E' : i > e ? 'I' : (sel[5] || []).indexOf('C') > -1 ? 'E' : 'I';
            var c2 = j > p ? 'J' : p > j ? 'P' : function() {
                var a = sel[1] || [];
                for (var k = 0; k < a.length; k++) { if (a[k] === 'A' || a[k] === 'B') return true; }
                return false;
            }() ? 'J' : 'P';
            var c3 = l > f ? 'L' : f > l ? 'F' : function() {
                var a = sel[9] || [];
                for (var k = 0; k < a.length; k++) { if (a[k] === 'A' || a[k] === 'B') return true; }
                return false;
            }() ? 'L' : 'F';
            var c4 = t > fs ? 'T' : fs > t ? 'F' : (sel[15] || []).indexOf('A') > -1 ? 'T' : 'F';
            var code = c1 + c2 + c3 + c4;
            var pData = pers[code];
            if (!pData) { alert('未找到人格：' + code); return; }
            document.getElementById('quizCard').classList.add('hidden');
            var resultArea = document.getElementById('resultArea');
            resultArea.innerHTML = buildResultCard(code, pData);
            // 滚动到结果
            setTimeout(function() {
                var target = resultArea.querySelector('.card');
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 100);
        }

        // ==================== 启动 ====================
        init();
    </script>
</body>
</html>
